name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p staging
          cp cli/target/${{ matrix.target }}/release/abrasive-cli staging/abrasive
          cd staging
          tar czf ../abrasive-${{ matrix.name }}.tar.gz abrasive

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: abrasive-${{ matrix.name }}
          path: abrasive-${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            abrasive-linux-x64/abrasive-linux-x64.tar.gz
            abrasive-linux-arm64/abrasive-linux-arm64.tar.gz
            abrasive-macos-x64/abrasive-macos-x64.tar.gz
            abrasive-macos-arm64/abrasive-macos-arm64.tar.gz
          generate_release_notes: true
